<section class="auth">
	<div class="auth__card">
		<span class="auth__badge">Acesso ao sistema</span>
		<h1>Entrar no PDV escolar</h1>
		<p class="auth__subtitle">
			Somente usuarios aprovados pelo administrador conseguem acessar o sistema.
		</p>

		@if (errorMessage()) {
			<div class="auth__message auth__message--error">{{ errorMessage() }}</div>
		}

		<form class="auth__form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
			<label class="field">
				<span>Email</span>
				<input type="email" formControlName="email" placeholder="voce@escola.com" />
				@if (fieldInvalid('email')) {
					<small>Digite um email valido.</small>
				}
			</label>

			<label class="field">
				<span>Senha</span>
				<input type="password" formControlName="password" placeholder="Sua senha" />
				@if (fieldInvalid('password')) {
					<small>A senha deve ter no minimo 6 caracteres.</small>
				}
			</label>

			<button class="submit-button" type="submit" [disabled]="isSubmitting()">
				@if (isSubmitting()) {
					Entrando...
				} @else {
					Entrar
				}
			</button>
		</form>

		<div class="auth__links">
			<a href="/create-account">Criar conta</a>
			<a href="/">Voltar para pagina inicial</a>
		</div>
	</div>
</section>
